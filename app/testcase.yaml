common:
  sysbuild: True
  timeout: 3600
  slow: true
  harness: pytest
  harness_config:
    pytest_dut_scope: function
    pytest_root:
      - "pytest/test_mender_mcu_client.py"
  tags:
    - testing
    - pytest
    - shell

tests:
  mender.mcu.client.default:
    extra_args: EXTRA_CONF_FILE="${WEST_TOPDIR}/local.conf;mcumgr.conf"
    platform_allow:
      - nrf7002dk/nrf5340/cpuapp/ns
  mender.mcu.client.troubleshoot:
    extra_args: EXTRA_CONF_FILE="${WEST_TOPDIR}/local.conf;mcumgr.conf;troubleshoot.conf"
    platform_allow:
      - nrf7002dk/nrf5340/cpuapp/ns
